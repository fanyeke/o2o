# Rule: High Discount Low Conversion
#
# Triggers when a coupon has high discount but low redemption rate
# Used to detect inefficient coupon strategies

id: high_discount_low_conversion
name: High Discount Low Conversion
description: 检测高折扣深度但低核销率的优惠券，表明券策略可能过于激进或不够精准
entity_type: coupon

# All conditions must be satisfied (AND logic)
conditions:
  # High discount depth (>= 30% discount)
  # discount_value = 1.0 - discount_rate (for 折扣券)
  # discount_value = discount_amount / threshold_amount (for 满减券)
  - field: discount_value
    operator: gte
    value: 0.3

  # Low redemption rate (< 10%)
  - field: redeemed_rate
    operator: lt
    value: 0.1

severity: medium

# Example entities that would trigger this rule:
# - Coupon with discount_value = 0.35 and redeemed_rate = 0.08
# - Coupon with discount_value = 0.5 and redeemed_rate = 0.05
# - 满减券 with discount_value = 50/100 = 0.5 and redeemed_rate = 0.08
# - 折扣券 with discount_value = 1.0 - 0.6 = 0.4 and redeemed_rate = 0.09