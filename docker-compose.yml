x-app-defaults: &app-defaults
  build:
    context: .
    dockerfile: Dockerfile
    target: dev
  volumes:
    - .:/app
  environment:
    - APP_ENV=dev
    - DATABASE_URL=postgresql+psycopg2://coupon_user:coupon_pass@postgres:5432/coupon_agent
    - REDIS_URL=redis://redis:6379/0
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: coupon_agent
      POSTGRES_USER: coupon_user
      POSTGRES_PASSWORD: coupon_pass
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coupon_user -d coupon_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    <<: *app-defaults
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    <<: *app-defaults
    command: celery -A app.tasks.celery_app worker -l info --concurrency=2

  beat:
    <<: *app-defaults
    command: celery -A app.tasks.celery_app beat -l info --scheduler celery.beat.PersistentScheduler

volumes:
  pg_data:
